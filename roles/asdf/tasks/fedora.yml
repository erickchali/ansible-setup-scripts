---
- name: Check if asdf is installed
  ansible.builtin.command: which asdf
  register: asdf_check
  changed_when: false
  failed_when: false

- name: Install asdf dependencies
  become: true
  ansible.builtin.dnf:
    name:
      - curl
      - git
    state: present
  when: asdf_check.rc != 0

- name: Install asdf binary
  when: asdf_check.rc != 0
  block:
    - name: Get latest asdf release version
      ansible.builtin.uri:
        url: https://api.github.com/repos/asdf-vm/asdf/releases/latest
        return_content: true
      register: asdf_release

    - name: Set asdf version
      ansible.builtin.set_fact:
        asdf_version: "{{ asdf_release.json.tag_name }}"

    - name: Download asdf binary
      ansible.builtin.get_url:
        url: "https://github.com/asdf-vm/asdf/releases/download/{{ asdf_version }}/asdf-{{ asdf_version }}-linux-amd64.tar.gz"
        dest: /tmp/asdf.tar.gz
        mode: "0644"

    - name: Extract asdf to /usr/local/bin
      become: true
      ansible.builtin.unarchive:
        src: /tmp/asdf.tar.gz
        dest: /usr/local/bin
        remote_src: true

    - name: Cleanup download
      ansible.builtin.file:
        path: /tmp/asdf.tar.gz
        state: absent
