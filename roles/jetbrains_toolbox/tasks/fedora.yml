---
- name: Check if JetBrains Toolbox is already installed
  ansible.builtin.stat:
    path: /opt/jetbrains/jetbrains-toolbox
  register: jb_bin

- name: Install libfuse (required by JetBrains Toolbox)
  become: true
  ansible.builtin.dnf:
    name: fuse-libs
    state: present
  when: not jb_bin.stat.exists

- name: Get latest JetBrains Toolbox download URL
  ansible.builtin.uri:
    url: https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release
    return_content: true
  register: jb_releases
  when: not jb_bin.stat.exists

- name: Set download URL
  ansible.builtin.set_fact:
    jb_url: "{{ (jb_releases.json.TBA[0].downloads.linux.link) }}"
  when: not jb_bin.stat.exists

- name: Download JetBrains Toolbox
  ansible.builtin.get_url:
    url: "{{ jb_url }}"
    dest: /tmp/jetbrains-toolbox.tar.gz
    mode: "0644"
  when: not jb_bin.stat.exists

- name: Extract JetBrains Toolbox to /tmp
  ansible.builtin.unarchive:
    src: /tmp/jetbrains-toolbox.tar.gz
    dest: /tmp/
    remote_src: true
  when: not jb_bin.stat.exists

- name: Find extracted directory name
  ansible.builtin.find:
    paths: /tmp
    patterns: "jetbrains-toolbox-*"
    file_type: directory
  register: jb_extracted
  when: not jb_bin.stat.exists

- name: Move to /opt/jetbrains
  become: true
  ansible.builtin.command:
    cmd: "mv {{ jb_extracted.files[0].path }} /opt/jetbrains"
    creates: /opt/jetbrains
  when:
    - not jb_bin.stat.exists
    - jb_extracted.files | default([]) | length > 0

- name: Create symlink for easy access
  become: true
  ansible.builtin.file:
    src: /opt/jetbrains/jetbrains-toolbox
    dest: /usr/local/bin/jetbrains-toolbox
    state: link

- name: Launch JetBrains Toolbox to register desktop entry
  ansible.builtin.shell:
    cmd: "nohup /opt/jetbrains/jetbrains-toolbox --minimize &>/dev/null &"
  when: not jb_bin.stat.exists
  changed_when: true

- name: Cleanup download
  ansible.builtin.file:
    path: /tmp/jetbrains-toolbox.tar.gz
    state: absent
